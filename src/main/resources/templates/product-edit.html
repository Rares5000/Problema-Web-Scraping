<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head('Edit product')}"></head>
<body>
<div th:replace="~{layout :: header}"></div>
<main>
    <h2>Edit product</h2>
    <form th:action="@{/products/{id}(id=${id})}" th:object="${productForm}" method="post" class="form">
        <label>
            <span>Name</span>
            <input type="text" th:field="*{name}" required>
            <small th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="field-error"></small>
        </label>
        <label>
            <span>Price</span>
            <input type="number" step="0.01" min="0" th:field="*{price}" required>
            <small th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="field-error"></small>
        </label>
        <label>
            <span>Currency</span>
            <input type="text" th:field="*{currency}" maxlength="3">
            <small th:if="${#fields.hasErrors('currency')}" th:errors="*{currency}" class="field-error"></small>
        </label>
        <label>
            <span>Image URL</span>
            <input type="url" th:field="*{imageUrl}">
            <small th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}" class="field-error"></small>
        </label>
        <label>
            <span>Description</span>
            <textarea th:field="*{description}" rows="4"></textarea>
            <small th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="field-error"></small>
        </label>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Save</button>
            <a th:href="@{/products}" class="btn">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
