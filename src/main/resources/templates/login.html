<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head('Sign in')}"></head>
<body>
<main class="login-main">
    <h1>AutoBrand</h1>
    <h2>Sign in</h2>
    <div th:if="${param.error}" class="alert error">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert success">You have been signed out.</div>
    <form th:action="@{/login}" method="post" class="form">
        <label>
            <span>Username</span>
            <input type="text" name="username" required autofocus>
        </label>
        <label>
            <span>Password</span>
            <input type="password" name="password" required>
        </label>
        <button type="submit" class="btn-primary">Sign in</button>
    </form>
</main>
</body>
</html>
