spring:
  application:
    name: scraping

  datasource:
    url: jdbc:h2:file:./data/autobrand
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

  thymeleaf:
    cache: false

server:
  port: 8080

scraper:
  base-url: https://www.web-scraping.dev
  login-path: /api/login
  products-path: /products
  category: consumables
  username: user123
  password: password
  currency: USD
  timeout: 15s

bnr:
  feed-url: https://www.bnr.ro/nbrfxrates.xml
  timeout: 15s

app:
  auth:
    username: admin
    password: admin
